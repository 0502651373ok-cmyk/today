<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today Is The Day</title>

<style>
body {
  font-family: Arial;
  background:#f7fbe7;
  margin:0;
  text-align:center;
}

header {
  background:linear-gradient(90deg,#ffee58,#aee571);
  padding:15px;
  font-weight:bold;
}

#app {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:10px;
}

#calendar {
  max-width:900px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day-btn {
  height:90px;
  border:none;
  border-radius:10px;
  background:#fff;
  cursor:pointer;
}

.day-btn.active {
  background:#aed581;
}

#dayInfo {
  width:300px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Today Is The Day</header>

<div id="app">
  <div id="calendar"></div>
  <div id="dayInfo">Вибери день</div>
</div>

<script>

const startDate = new Date();
let data = [];

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

function showCalendar(){
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const header = document.createElement("div");

  const prev = document.createElement("button");
  prev.innerText="←";
  prev.onclick=()=>{
    currentMonth--;
    if(currentMonth<0){currentMonth=11;currentYear--;}
    showCalendar();
  };

  const next = document.createElement("button");
  next.innerText="→";
  next.onclick=()=>{
    currentMonth++;
    if(currentMonth>11){currentMonth=0;currentYear++;}
    showCalendar();
  };

  const title = document.createElement("span");
  const monthName = new Date(currentYear,currentMonth).toLocaleString("uk-UA",{month:"long"});
  title.innerText = monthName.charAt(0).toUpperCase()+monthName.slice(1)+" "+currentYear+" р.";

  header.append(prev,title,next);
  cal.appendChild(header);

  const grid=document.createElement("div");
  grid.className="grid";

  const firstDay = new Date(currentYear,currentMonth,1).getDay();
  const days = new Date(currentYear,currentMonth+1,0).getDate();

  let start = firstDay===0?6:firstDay-1;

  for(let i=0;i<start;i++){
    grid.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=days; d++){
    const btn=document.createElement("button");
    btn.className="day-btn";
    btn.innerText=d;

    const date=new Date(currentYear,currentMonth,d);

    btn.onclick=()=>{
      document.querySelectorAll(".day-btn").forEach(x=>x.classList.remove("active"));
      btn.classList.add("active");
      loadDayInfo(date);
    };

    grid.appendChild(btn);
  }

  cal.appendChild(grid);
}

// === ГОЛОВНЕ ВИПРАВЛЕННЯ ===
async function loadDayInfo(dateObj){

  const box = document.getElementById("dayInfo");

  const year = dateObj.getFullYear();
  const month = String(dateObj.getMonth()+1).padStart(2,"0");
  const day = String(dateObj.getDate()).padStart(2,"0");

  let holidays = [];
  let historyEvents = [];

  try {
    const holidayRes = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/PL`);
    if (holidayRes.ok) {
      const holidayData = await holidayRes.json();
      holidays = holidayData.filter(h => h.date === `${year}-${month}-${day}`);
    }
  } catch(e){}

  try {
    const historyRes = await fetch(`https://byabbe.se/on-this-day/${month}/${day}/events.json`);
    if (historyRes.ok) {
      const historyData = await historyRes.json();
      historyEvents = historyData.events.slice(0,5);
    }
  } catch(e){}

  let html = `<h3>${dateObj.toLocaleDateString("pl-PL")}</h3>`;

  html += "<b>Polska:</b><br>";
  if(holidays.length){
    holidays.forEach(h=>{
      html += "• "+h.localName+"<br>";
    });
  } else {
    html += "Brak świąt<br>";
  }

  html += "<br><b>Historia:</b><br>";

  if(historyEvents.length){
    historyEvents.forEach(ev=>{
      html += `${ev.year}: ${ev.description}<br>`;
    });
  } else {
    html += "Brak danych<br>";
  }

  box.innerHTML = html;
}

showCalendar();

</script>
</body>
</html>

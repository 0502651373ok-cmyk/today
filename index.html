<style>
body {
  font-family: Arial, sans-serif;

header {

<script>
// === 1. Початкові дані ===
if (!localStorage.getItem("trackerStartDate")) {
  const now = new Date();
  now.setHours(0,0,0,0);
  localStorage.setItem("trackerStartDate", now.toISOString());
}

const startDate = new Date(localStorage.getItem("trackerStartDate"));
startDate.setHours(0,0,0,0);

const today = new Date();
today.setHours(0,0,0,0);

let diffDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
if (diffDays < 0) diffDays = 0;

const todayIndex = diffDays;
let data = JSON.parse(localStorage.getItem("trackerData")) || [];
let currentMonth = today.getMonth();
let currentYear = today.getFullYear();
let currentOpenedIndex = todayIndex;

// === 2. Схеми ліків ===
function getDefaultMedicinePlans() {
  return [
    {
      id: "plan_default",
      name: "Базова схема",
      effectiveFrom: startDate.toISOString().slice(0, 10),
      morning: [
        "Creatine, Vitamin C, Ubiquinol, Мумійо, L-Tryptophan, Magnesium malate, Розторопша, Amino Max"
      ],
      day: [
        "Amino Max, Resveratrol, DHA-500, Vitamin C, Розторопша"
      ],
      evening: [
        "Magnesium bisglycinate, L-Tryptophan, Розторопша"
      ]
    }
  ];
}

let medicinePlans = JSON.parse(localStorage.getItem("trackerMedicinePlans")) || getDefaultMedicinePlans();

function saveMedicinePlans() {
  localStorage.setItem("trackerMedicinePlans", JSON.stringify(medicinePlans));
}

function ensureDayExists(i) {
  while (data.length <= i) {
    data.push({ tasks: {}, diary: "" });
  }
}

ensureDayExists(todayIndex);

function normalizeList(text) {
  return text
    .split("\n")
    .map(x => x.trim())
    .filter(Boolean);
}

function parseYMDToDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setHours(0,0,0,0);
  return dt;
}

function getMedicinePlanForDate(dateObj) {
  const target = new Date(dateObj);
  target.setHours(0,0,0,0);

  const sorted = [...medicinePlans].sort((a, b) => a.effectiveFrom.localeCompare(b.effectiveFrom));
  let active = sorted[0] || null;

  sorted.forEach(plan => {
    const planDate = parseYMDToDate(plan.effectiveFrom);
    if (planDate <= target) active = plan;
  });

  return active;
}

// === 3. Фрази дня ===
const quotes = [
  "Nie zatrzymuj się – nawet jeśli dziś boli.",
  "Jeszcze nic nie jest skończone.",
  "Żyjesz – to znaczy, możesz jeszcze zacząć.",
  "Nawet mały krok – to też kierunek.",
  "To, że dziś jest trudno, nie oznacza, że się cofasz.",
  "Nie wszystko musi być idealne, żeby miało sens.",
  "Nie musisz przyspieszać. Wystarczy, że idziesz.",
  "Twoje tempo też jest tempem.",
  "Stabilność to też postęp.",
  "Największy postęp dzieje się wtedy, gdy nikt go nie widzi."
];

document.getElementById("quote").innerText =
  quotes[Math.floor(Math.random() * quotes.length)];

// === 4. Польські дати ===
const polishSpecialDays = {
  "01-01": ["Nowy Rok"],
  "01-06": ["Święto Trzech Króli"],
  "02-14": ["Walentynki"],
  "03-08": ["Dzień Kobiet"],
  "04-01": ["Prima Aprilis"],
  "05-01": ["Święto Pracy"],
  "05-02": ["Dzień Flagi Rzeczypospolitej Polskiej"],
  "05-03": ["Święto Konstytucji 3 Maja"],
  "05-26": ["Dzień Matki"],
  "06-01": ["Dzień Dziecka"],
  "06-23": ["Dzień Ojca"],
  "08-01": ["Rocznica wybuchu Powstania Warszawskiego"],
  "08-15": ["Święto Wojska Polskiego", "Wniebowzięcie Najświętszej Maryi Panny"],
  "09-01": ["Rocznica wybuchu II wojny światowej"],
  "10-14": ["Dzień Edukacji Narodowej"],
  "11-01": ["Wszystkich Świętych"],
  "11-11": ["Narodowe Święto Niepodległości"],
  "11-30": ["Andrzejki"],
  "12-06": ["Mikołajki"],
  "12-24": ["Wigilia"],
  "12-25": ["Boże Narodzenie"],
  "12-26": ["Drugi dzień Bożego Narodzenia"],
  "12-31": ["Sylwester"]
};

// === 5. Прогрес-бар ===
function updateProgress() {
  let total = 0;
  let done = 0;

  data.forEach(day => {
    for (const t in day.tasks) {
      total++;
      if (day.tasks[t]) done++;
    }
  });

  const percent = total ? Math.round(done / total * 100) : 0;
  document.getElementById("progressFill").style.width = percent + "%";
  document.getElementById("progressText").innerText = "Виконано: " + percent + "%";
}

function saveData() {
  localStorage.setItem("trackerData", JSON.stringify(data));
  updateProgress();
}

function capitalizeFirst(str) {
  if (!str) return str;
  return str.charAt(0).toUpperCase() + str.slice(1);
}

function getMonthTitle(year, month) {
  const monthName = new Date(year, month, 1).toLocaleDateString("uk-UA", { month: "long" });
  return `${capitalizeFirst(monthName)} ${year} р.`;
}

function refreshDayButtonState(i) {
  const btn = document.querySelector(`.day-btn[data-day-index="${i}"]`);
  if (!btn) return;

  const tasks = data[i]?.tasks || {};
  const isDone = Object.keys(tasks).length > 0 && Object.values(tasks).every(Boolean);

  btn.classList.toggle("done", isDone);
  document.querySelectorAll(".day-btn").forEach(x => x.classList.remove("active-day"));
  btn.classList.add("active-day");
}

// === 6. Побудова розкладу дня ===
function getCosmeticsForWeekday(weekday) {
  const cosmetics = [
    {morning:["Дарсонваль (обличчя, брови, волосся)","Іонофорез Ion+ з Bielenda (віт.С)","Після D-Пантенол","SPF 50+"],day:[],evening:[]},
    {morning:["Маска Renew Anti Age","SPF 50+"],day:["Відпочинок, зволоження"],evening:[]},
    {morning:["SPF 50+"],day:[],evening:["Іонофорез Ion− із содовим розчином","Після Retinobaza 17000"]},
    {morning:["Дарсонваль","Кавітаційна чистка","Після D-Пантенол","SPF 50+"],day:[],evening:[]},
    {morning:["EMS-L з Bielenda (віт.С)","SPF 50+"],day:[],evening:["EMS-L з Dermogal A+E або Retinol Collagen Complex","Після D-Пантенол"]},
    {morning:["Желатинова маска для волосся","Маска Renew Anti Age","SPF 50+"],day:[],evening:["EMS-H з Retinol Collagen Complex","Після D-Пантенол"]},
    {morning:["Маска Renew Anti Age","Дарсонваль","SPF 50+"],day:[],evening:["Голкова мезотерапія (обличчя+волосся)","Після D-Пантенол"]}
  ];
  return cosmetics[weekday];
}

function buildScheduleForDate(dayIndex, weekday, dateObj) {
  const plan = getMedicinePlanForDate(dateObj);
  const dcos = getCosmeticsForWeekday(weekday);
  const cleaningSchedule = ["Нема","Кухня","Зал","Санвузол","Балкон/коридор","Генеральне","Нема"];
  const dayCleaning = cleaningSchedule[weekday];
  const workout = dayIndex % 2 === 0 ? "Фітнес 40 хв" : "Ходіння з палками 45 хв";

  const schedule = {
    РАНОК: [
      "☕ Кава з молоком",
      ...(plan?.morning || []),
      "Зарядка для шиї 20 хв + Ляпко 20 хв",
      ...dcos.morning
    ],
    ДЕНЬ: [
      workout,
      ...(plan?.day || []),
      ...dcos.day
    ],
    ВЕЧІР: [
      ...(plan?.evening || []),
      "Розтяжка + дихальні вправи",
      ...dcos.evening
    ]
  };

  return {
    schedule,
    dayCleaning,
    plan
  };
}

function syncTasksForCurrentSchedule(i, schedule, dayCleaning) {
  const allowedKeys = new Set();

  Object.entries(schedule).forEach(([title, items]) => {
    items.forEach(txt => {
      allowedKeys.add(title + "_" + txt);
    });
  });

  allowedKeys.add("ПРИБИРАННЯ_" + dayCleaning);

  const existingTasks = data[i].tasks || {};
  const newTasks = {};

  [...allowedKeys].forEach(key => {
    newTasks[key] = existingTasks[key] ?? false;
  });

  data[i].tasks = newTasks;
}

// === 7. Календар ===
function showCalendar(selectedIndex = null) {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const header = document.createElement("div");
  header.className = "calendar-header";

  const prevBtn = document.createElement("button");
  prevBtn.className = "calendar-nav";
  prevBtn.textContent = "←";
  prevBtn.onclick = () => {
    currentMonth--;
    if (currentMonth < 0) {
      currentMonth = 11;
      currentYear--;
    }
    showCalendar(selectedIndex);
  };

  const title = document.createElement("div");
  title.className = "calendar-title";
  title.textContent = getMonthTitle(currentYear, currentMonth);

  const nextBtn = document.createElement("button");
  nextBtn.className = "calendar-nav";
  nextBtn.textContent = "→";
  nextBtn.onclick = () => {
    currentMonth++;
    if (currentMonth > 11) {
      currentMonth = 0;
      currentYear++;
    }
    showCalendar(selectedIndex);
  };

  header.append(prevBtn, title, nextBtn);
  cal.appendChild(header);

  const grid = document.createElement("div");
  grid.className = "calendar-grid";

  const weekDays = ["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];
  weekDays.forEach(dayName => {
    const wd = document.createElement("div");
    wd.className = "calendar-weekday";
    wd.textContent = dayName;
    grid.appendChild(wd);
  });

  const firstDay = new Date(currentYear, currentMonth, 1);
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const firstWeekday = (firstDay.getDay() + 6) % 7;

  for (let i = 0; i < firstWeekday; i++) {
    const empty = document.createElement("div");
    empty.className = "calendar-empty";
    grid.appendChild(empty);
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const cellDate = new Date(currentYear, currentMonth, day);
    cellDate.setHours(0,0,0,0);

    const index = Math.floor((cellDate - startDate) / (1000 * 60 * 60 * 24));
    const btn = document.createElement("button");
    btn.className = "day-btn";

    btn.innerText =
      `${cellDate.getDate()} ${cellDate.toLocaleString("uk-UA", { month: "short" })}\n(${cellDate.toLocaleString("uk-UA", { weekday: "short" })})`;

    if (cellDate.toDateString() === today.toDateString()) {
      btn.classList.add("today");
    }

    if (index >= 0) {
      ensureDayExists(index);
      btn.dataset.dayIndex = index;

      const tasks = data[index].tasks || {};
      const isDone = Object.keys(tasks).length > 0 && Object.values(tasks).every(Boolean);
      if (isDone) btn.classList.add("done");

      if (selectedIndex === index) {
        btn.classList.add("active-day");
      }

      btn.onclick = () => openDay(index);
    } else {
      btn.classList.add("outside-range");
      btn.disabled = true;
    }

    grid.appendChild(btn);
  }

  cal.appendChild(grid);
}

// === 8. Блок справа ===
async function loadDayInfo(dateObj) {
  const box = document.getElementById("dayInfoContent");
  if (!box) return;

  const year = dateObj.getFullYear();
  const month = String(dateObj.getMonth() + 1).padStart(2, "0");
  const day = String(dateObj.getDate()).padStart(2, "0");
  const md = `${month}-${day}`;

  const specialDays = polishSpecialDays[md] || [];

  box.innerHTML = `
    <div class="day-info-date">
      ${capitalizeFirst(dateObj.toLocaleDateString("pl-PL", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      }))}
    </div>
    <div class="day-info-block">
      <h4>Polska</h4>
      <div class="day-info-muted">Ładowanie informacji...</div>
    </div>
    <div class="day-info-block">
      <h4>Wydarzenia historyczne</h4>
      <div class="day-info-muted">Ładowanie informacji...</div>
    </div>
  `;

  let holidays = [];
  let historyEvents = [];

  try {
    const holidayRes = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/PL`);
    if (holidayRes.ok) {
      const holidayData = await holidayRes.json();
      holidays = holidayData.filter(h => h.date === `${year}-${month}-${day}`);
    }
  } catch (e) {
    console.error("Błąd pobierania świąt:", e);
  }

  try {
    const historyRes = await fetch(`https://byabbe.se/on-this-day/${month}/${day}/events.json`);
    if (historyRes.ok) {
      const historyData = await historyRes.json();
      historyEvents = (historyData.events || []).slice(0, 5).map(ev => ({
        year: ev.year,
        text: ev.description
      }));
    }
  } catch (e) {
    console.error("Błąd pobierania wydarzeń historycznych:", e);
  }

  let html = `
    <div class="day-info-date">
      ${capitalizeFirst(dateObj.toLocaleDateString("pl-PL", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      }))}
    </div>
  `;

  html += `<div class="day-info-block"><h4>Polska</h4>`;

  if (holidays.length || specialDays.length) {
    html += "<ul>";

    holidays.forEach(h => {
      html += `<li>${h.localName}</li>`;
    });

    specialDays.forEach(d => {
      const exists = holidays.some(h => h.localName === d || h.name === d);
      if (!exists) {
        html += `<li>${d}</li>`;
      }
    });

    html += "</ul>";
  } else {
    html += `<div class="day-info-muted">Brak oficjalnego święta państwowego ani znanej daty okolicznościowej.</div>`;
  }

  html += `</div>`;

  html += `<div class="day-info-block"><h4>Wydarzenia historyczne</h4>`;

  if (historyEvents.length) {
    html += "<ul>";
    historyEvents.forEach(ev => {
      html += `<li>${ev.year}: ${ev.text}</li>`;
    });
    html += "</ul>";
  } else {
    html += `<div class="day-info-muted">Nie udało się pobrać wydarzeń historycznych.</div>`;
  }

  html += `</div>`;

  box.innerHTML = html;
}

// === 9. Відкриття дня ===
function openDay(i) {
  try {
    currentOpenedIndex = i;
    ensureDayExists(i);

    const c = document.getElementById("content");
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    d.setHours(0,0,0,0);

    const weekday = d.getDay() === 0 ? 6 : d.getDay() - 1;
    const weekDays = ["Понеділок","Вівторок","Середа","Четвер","П’ятниця","Субота","Неділя"];
    const dayName = weekDays[weekday];

    const { schedule, dayCleaning, plan } = buildScheduleForDate(i, weekday, d);
    syncTasksForCurrentSchedule(i, schedule, dayCleaning);

    const fullDate = d.toLocaleDateString("uk-UA", { day: "numeric", month: "long" });
    c.innerHTML = `<h2>${dayName}, ${fullDate} — День ${i + 1}</h2>`;

    const badge = document.createElement("div");
    badge.className = "plan-badge";
    badge.innerHTML = `Схема ліків: ${plan ? plan.name : "—"}<small>Діє з ${plan ? plan.effectiveFrom : "—"}</small>`;
    c.appendChild(badge);

    refreshDayButtonState(i);

    for (const [title, items] of Object.entries(schedule)) {
      const sec = document.createElement("section");
      sec.innerHTML = "<h3>" + title + "</h3>";

      items.forEach(txt => {
        const key = title + "_" + txt;

        const lbl = document.createElement("label");
        const chk = document.createElement("input");
        chk.type = "checkbox";
        chk.checked = data[i].tasks[key];
        chk.onchange = () => {
          data[i].tasks[key] = chk.checked;
          saveData();
          refreshDayButtonState(i);
        };

        lbl.appendChild(chk);
        lbl.appendChild(document.createTextNode(" " + txt));
        sec.appendChild(lbl);
      });

      c.appendChild(sec);
    }

    const clSection = document.createElement("section");
    clSection.innerHTML = "<h3>ПРИБИРАННЯ</h3>";

    const clKey = "ПРИБИРАННЯ_" + dayCleaning;

    const clLabel = document.createElement("label");
    const clCheckbox = document.createElement("input");
    clCheckbox.type = "checkbox";
    clCheckbox.checked = data[i].tasks[clKey];
    clCheckbox.onchange = () => {
      data[i].tasks[clKey] = clCheckbox.checked;
      saveData();
      refreshDayButtonState(i);
    };

    clLabel.appendChild(clCheckbox);
    clLabel.appendChild(document.createTextNode(" " + dayCleaning));
    clSection.appendChild(clLabel);
    c.appendChild(clSection);

    const diary = document.createElement("section");
    diary.innerHTML = "<h3>ЩОДЕННИК</h3>";
    const ta = document.createElement("textarea");
    ta.value = data[i].diary || "";
    ta.placeholder = "Запиши, як минув день...";
    ta.oninput = () => {
      data[i].diary = ta.value;
      saveData();
    };
    diary.appendChild(ta);
    c.appendChild(diary);

    const back = document.createElement("button");
    back.className = "back";
    back.innerText = "← Назад до календаря";
    back.onclick = () => {
      currentMonth = d.getMonth();
      currentYear = d.getFullYear();
      showCalendar(i);
      document.getElementById("content").style.display = "none";
    };
    c.appendChild(back);

    c.style.display = "block";

    saveData();
    loadDayInfo(d);

  } catch (e) {
    console.error("Błąd w openDay:", e);
  }
}

// === 10. Модальне вікно ліків ===
const medicineModal = document.getElementById("medicineModal");
const medicineBtn = document.getElementById("medicineBtn");
const closeMedicineModalBtn = document.getElementById("closeMedicineModalBtn");
const savePlanBtn = document.getElementById("savePlanBtn");

function renderMedicinePlans() {
  const box = document.getElementById("planListContent");
  box.innerHTML = "";

  const sorted = [...medicinePlans].sort((a, b) => a.effectiveFrom.localeCompare(b.effectiveFrom));

  if (!sorted.length) {
    box.innerHTML = `<div class="day-info-muted">Схем поки що немає.</div>`;
    return;
  }

  sorted.forEach(plan => {
    const card = document.createElement("div");
    card.className = "plan-card";

    const m = (plan.morning || []).map(x => `<li>${x}</li>`).join("");
    const d = (plan.day || []).map(x => `<li>${x}</li>`).join("");
    const e = (plan.evening || []).map(x => `<li>${x}</li>`).join("");

    card.innerHTML = `
      <h4>${plan.name}</h4>
      <small>Діє з: ${plan.effectiveFrom}</small>
      <div><strong>Ранок:</strong><ul>${m || "<li>—</li>"}</ul></div>
      <div><strong>День:</strong><ul>${d || "<li>—</li>"}</ul></div>
      <div><strong>Вечір:</strong><ul>${e || "<li>—</li>"}</ul></div>
    `;

    const actions = document.createElement("div");
    actions.className = "plan-actions";

    const delBtn = document.createElement("button");
    delBtn.className = "delete-plan-btn";
    delBtn.textContent = "Видалити";
    delBtn.onclick = () => {
      if (medicinePlans.length <= 1) {
        alert("Останню схему видаляти не можна.");
        return;
      }
      const ok = confirm(`Видалити схему "${plan.name}"?`);
      if (!ok) return;

      medicinePlans = medicinePlans.filter(x => x.id !== plan.id);
      saveMedicinePlans();
      renderMedicinePlans();
      if (typeof currentOpenedIndex === "number") {
        openDay(currentOpenedIndex);
      }
    };

    actions.appendChild(delBtn);
    card.appendChild(actions);
    box.appendChild(card);
  });
}

function openMedicineModal() {
  const selectedDate = new Date(startDate);
  selectedDate.setDate(startDate.getDate() + currentOpenedIndex);
  document.getElementById("planEffectiveFrom").value = selectedDate.toISOString().slice(0, 10);
  document.getElementById("planName").value = "";
  document.getElementById("planMorning").value = "";
  document.getElementById("planDay").value = "";
  document.getElementById("planEvening").value = "";

  renderMedicinePlans();
  medicineModal.classList.add("open");
}

function closeMedicineModal() {
  medicineModal.classList.remove("open");
}

medicineBtn.onclick = openMedicineModal;
closeMedicineModalBtn.onclick = closeMedicineModal;

medicineModal.addEventListener("click", (e) => {
  if (e.target === medicineModal) closeMedicineModal();
});

savePlanBtn.onclick = () => {
  const name = document.getElementById("planName").value.trim();
  const effectiveFrom = document.getElementById("planEffectiveFrom").value;
  const morning = normalizeList(document.getElementById("planMorning").value);
  const day = normalizeList(document.getElementById("planDay").value);
  const evening = normalizeList(document.getElementById("planEvening").value);

  if (!name) {
    alert("Вкажи назву схеми.");
    return;
  }

  if (!effectiveFrom) {
    alert("Вкажи дату початку схеми.");
    return;
  }

  medicinePlans.push({
    id: "plan_" + Date.now(),
    name,
    effectiveFrom,
    morning,
    day,
    evening
  });

  medicinePlans.sort((a, b) => a.effectiveFrom.localeCompare(b.effectiveFrom));
  saveMedicinePlans();
  renderMedicinePlans();
  openDay(currentOpenedIndex);

  document.getElementById("planName").value = "";
  document.getElementById("planMorning").value = "";
  document.getElementById("planDay").value = "";
  document.getElementById("planEvening").value = "";
};

// === 11. Експорт у DOCX ===
document.getElementById("exportBtn").onclick = function() {
  let text = "☀️ Today Is The Day — Щоденник прогресу\n\n";

  data.forEach((d, i) => {
    if (d.diary) {
      const dt = new Date(startDate);
      dt.setDate(startDate.getDate() + i);
      text += `День ${i + 1} (${dt.toLocaleDateString("uk-UA")}):\n${d.diary}\n\n`;
    }
  });

  const blob = new Blob([text], {
    type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
  });

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "TodayIsTheDay_Щоденник.docx";
  a.click();
};

// === 12. Старт ===
saveMedicinePlans();
updateProgress();
showCalendar(todayIndex);
openDay(todayIndex);
</script>
